<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- TapTap H5 横竖屏声明：竖屏游戏 -->
<meta name="x5-orientation" content="portrait">
<meta name="screen-orientation" content="portrait">
<title>暗影地牢 - 文字策略RPG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d0d;--panel:#1a1a2e;--panel2:#16213e;--border:#2a2a4a;--gold:#c9a227;--gold2:#e8d44d;--red:#c0392b;--green:#27ae60;--blue:#2980b9;--purple:#8e44ad;--text:#d4c5a0;--text2:#8a7d6b;--text3:#5a5245;--hp-bar:#c0392b;--mp-bar:#2980b9;--exp-bar:#27ae60;--nav-h:52px;--top-h:36px}
body{background:var(--bg);color:var(--text);font-family:'Microsoft YaHei','PingFang SC','SimHei',sans-serif;font-size:14px;overflow:hidden;height:100vh;width:100vw;-webkit-user-select:none;user-select:none}
#app{display:flex;flex-direction:column;height:100vh;width:100vw}

/* ===== 顶部栏（桌面端） ===== */
#top-bar{height:var(--top-h);background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;flex-wrap:nowrap}
#top-bar::-webkit-scrollbar{display:none}
.res-item{display:flex;align-items:center;gap:3px;font-size:12px;white-space:nowrap;flex-shrink:0}
.res-icon{font-size:14px}
.res-val{color:var(--gold);font-weight:bold}
.sep{color:var(--text3);margin:0 2px;flex-shrink:0}

/* ===== 底部导航（移动端） ===== */
#sidebar{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:0 2px;z-index:50;gap:0;flex-shrink:0}
#sidebar .nav-btn{width:auto;height:var(--nav-h);border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:0;font-size:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s;flex:1;min-width:0;padding:2px 0}
#sidebar .nav-btn:hover,#sidebar .nav-btn.active{background:transparent;color:var(--gold);border-color:transparent}
#sidebar .nav-btn .nav-label{font-size:9px;margin-top:1px;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
#sidebar .nav-btn .nav-icon{font-size:18px;line-height:1}

/* ===== 主内容区 ===== */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding-bottom:var(--nav-h)}
#content{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;-webkit-overflow-scrolling:touch}
#content::-webkit-scrollbar{width:4px}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* 战斗面板 - 可滚动 */
#battle-panel{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;-webkit-overflow-scrolling:touch}
#battle-panel::-webkit-scrollbar{width:4px}
#battle-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ===== 面板 ===== */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px}
.panel-title{color:var(--gold);font-size:14px;font-weight:bold;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.panel-title .icon{font-size:16px}

/* ===== 英雄卡片 ===== */
.hero-card{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:6px;cursor:pointer;transition:all .2s;display:flex;gap:8px}
.hero-card:active{border-color:var(--gold);transform:translateX(2px)}
.hero-card.selected{border-color:var(--gold);box-shadow:0 0 6px rgba(201,162,39,.3)}
.hero-avatar{width:44px;height:44px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;border:2px solid var(--border)}
.hero-info{flex:1;min-width:0}
.hero-name{font-size:13px;font-weight:bold;color:var(--gold)}
.hero-meta{font-size:10px;color:var(--text2);margin-top:1px}
.hero-stats{font-size:10px;color:var(--text2);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap}
.hero-skills{font-size:10px;margin-top:3px;display:flex;gap:3px;flex-wrap:wrap}
.skill-tag{background:rgba(41,128,185,.2);color:var(--blue);padding:1px 5px;border-radius:3px;font-size:9px}
.stat-tag{color:var(--text2)}
.stat-tag b{color:var(--text)}
.bar-wrap{height:3px;background:#111;border-radius:2px;margin-top:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .3s}

/* 品质颜色 */
.quality-common{border-color:#888!important}
.quality-rare{border-color:#4a9eff!important}
.quality-epic{border-color:#a855f7!important}
.quality-legendary{border-color:#f59e0b!important}
.quality-mythic{border-color:#ef4444!important}
.q-common{color:#888}.q-rare{color:#4a9eff}.q-epic{color:#a855f7}.q-legendary{color:#f59e0b}.q-mythic{color:#ef4444}

/* ===== 按钮 ===== */
.btn{padding:7px 16px;border:1px solid var(--border);background:var(--panel2);color:var(--text);cursor:pointer;border-radius:6px;font-size:13px;transition:all .2s;font-family:inherit;touch-action:manipulation}
.btn:active{opacity:.7}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#2a1a00,#3a2a00);border-color:var(--gold);color:var(--gold)}
.btn-primary:active{background:linear-gradient(135deg,#3a2a00,#4a3a00)}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:4px}
.btn-group{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}

/* ===== 战斗场景 ===== */
.battle-scene{position:relative;background:linear-gradient(180deg,#0a0a14 0%,#12121f 50%,#1a1a2e 100%);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px;overflow:hidden;min-height:200px}
.battle-scene::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 120%,rgba(100,50,150,.08) 0%,transparent 70%);pointer-events:none}
.battle-vs{display:flex;gap:6px;align-items:start;justify-content:center}
.battle-vs > div{min-width:0;flex-shrink:1}
.battle-vs .ally-side,.battle-vs .enemy-side{display:flex;flex-direction:column;gap:6px;min-width:0;flex:1}
.battle-vs .vs-center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:20px;flex-shrink:0;min-width:30px}
.battle-side-label{text-align:center;font-size:11px;font-weight:bold;padding:3px 0;border-radius:4px;letter-spacing:1px}
.battle-side-label.ally{color:#5dade2;background:rgba(93,173,226,.1);border:1px solid rgba(93,173,226,.2)}
.battle-side-label.enemy{color:#e74c3c;background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.2)}
.battle-vs-text{font-size:20px;font-weight:900;color:var(--gold);text-shadow:0 0 20px rgba(201,162,39,.5);animation:vsPulse 2s ease-in-out infinite}
@keyframes vsPulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.1);opacity:1}}
.battle-round-badge{font-size:9px;color:var(--text2);margin-top:6px;background:var(--panel2);padding:2px 6px;border-radius:10px;border:1px solid var(--border)}

/* ===== 战斗单位卡片 ===== */
.battle-unit{position:relative;background:linear-gradient(145deg,#16213e,#1a1a2e);border:2px solid var(--border);border-radius:8px;padding:6px;min-width:110px;transition:all .4s ease;overflow:visible;width:100%}
.battle-unit::after{content:'';position:absolute;top:-1px;left:-1px;right:-1px;bottom:-1px;border-radius:8px;opacity:0;transition:opacity .3s;pointer-events:none}
.battle-unit.ally-unit{border-color:rgba(93,173,226,.3)}
.battle-unit.ally-unit::after{box-shadow:0 0 10px rgba(93,173,226,.3)}
.battle-unit.enemy-unit{border-color:rgba(231,76,60,.3)}
.battle-unit.enemy-unit::after{box-shadow:0 0 10px rgba(231,76,60,.3)}
.battle-unit.dead{opacity:.3;filter:grayscale(1) brightness(.5);transform:scale(.92)}
.battle-unit.dead .unit-avatar{filter:grayscale(1)}
.battle-unit.acting{z-index:10;transform:scale(1.04)}
.battle-unit.acting::after{opacity:1}
.battle-unit.acting.ally-unit{border-color:#5dade2;box-shadow:0 0 15px rgba(93,173,226,.4)}
.battle-unit.acting.enemy-unit{border-color:#e74c3c;box-shadow:0 0 15px rgba(231,76,60,.4)}
.battle-unit.hit{animation:hitShake .3s ease}
.battle-unit.heal-target{animation:healGlow .5s ease}
.battle-unit.shield-up{animation:shieldFlash .4s ease}
@keyframes hitShake{0%{transform:translateX(0)}15%{transform:translateX(-4px)}30%{transform:translateX(3px)}45%{transform:translateX(-2px)}60%{transform:translateX(2px)}75%{transform:translateX(-1px)}100%{transform:translateX(0)}}
@keyframes healGlow{0%{box-shadow:0 0 0 rgba(46,204,113,0)}50%{box-shadow:0 0 15px rgba(46,204,113,.5)}100%{box-shadow:0 0 0 rgba(46,204,113,0)}}
@keyframes shieldFlash{0%{box-shadow:0 0 0 rgba(52,152,219,0)}50%{box-shadow:0 0 20px rgba(52,152,219,.6)}100%{box-shadow:0 0 0 rgba(52,152,219,0)}}
@keyframes deathFade{0%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.05);filter:grayscale(.5) brightness(1.5)}100%{opacity:.3;transform:scale(.92);filter:grayscale(1) brightness(.5)}}
.battle-unit.dying{animation:deathFade .6s ease forwards}

/* 战斗单位头像 */
.unit-avatar-wrap{position:relative;width:44px;height:44px;margin:0 auto 4px}
.unit-avatar{width:44px;height:44px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid var(--border);background:rgba(0,0,0,.3);position:relative;z-index:1;margin:0 auto}
.unit-avatar.quality-common{border-color:#666}.unit-avatar.quality-rare{border-color:#4a9eff;box-shadow:0 0 6px rgba(74,158,255,.3)}
.unit-avatar.quality-epic{border-color:#a855f7;box-shadow:0 0 6px rgba(168,85,247,.3)}
.unit-avatar.quality-legendary{border-color:#f59e0b;box-shadow:0 0 8px rgba(245,158,11,.4)}
.unit-avatar.quality-mythic{border-color:#ef4444;box-shadow:0 0 10px rgba(239,68,68,.4)}
.unit-level{position:absolute;bottom:-2px;right:-2px;background:#111;border:1px solid var(--border);border-radius:3px;padding:0 4px;font-size:8px;color:var(--gold);font-weight:bold;z-index:2}
.unit-role-icon{position:absolute;top:-4px;left:-4px;font-size:11px;z-index:2;filter:drop-shadow(0 1px 2px rgba(0,0,0,.8))}
.unit-name{text-align:center;font-size:11px;font-weight:bold;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.unit-bars{display:flex;flex-direction:column;gap:2px}
.unit-bar{display:flex;align-items:center;gap:3px;font-size:8px}
.unit-bar-label{width:16px;text-align:right;color:var(--text3);font-weight:bold;flex-shrink:0}
.unit-bar-track{flex:1;height:5px;background:#0a0a0a;border-radius:2px;overflow:hidden;position:relative;min-width:30px}
.unit-bar-fill{height:100%;border-radius:2px;transition:width .4s ease;position:relative}
.unit-bar-fill.hp{background:linear-gradient(90deg,#c0392b,#e74c3c)}
.unit-bar-fill.hp.low{background:linear-gradient(90deg,#922b21,#c0392b);animation:hpPulse 1s ease-in-out infinite}
.unit-bar-fill.mp{background:linear-gradient(90deg,#2471a3,#3498db)}
.unit-bar-fill.shield-bar{background:linear-gradient(90deg,#2e86c1,#5dade2);position:absolute;top:0;left:0;z-index:1}
@keyframes hpPulse{0%,100%{opacity:1}50%{opacity:.6}}
.unit-bar-val{width:36px;text-align:left;color:var(--text2);font-size:8px;flex-shrink:0}
.unit-buffs{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:3px;min-height:14px}
.buff-tag{padding:1px 4px;border-radius:2px;font-size:8px;font-weight:bold;border:1px solid transparent}

/* 浮动伤害数字 */
.float-num{position:absolute;font-weight:900;font-size:14px;pointer-events:none;z-index:100;animation:floatUp 1s ease-out forwards;text-shadow:0 2px 4px rgba(0,0,0,.8);white-space:nowrap;left:50%;transform:translateX(-50%)}
.float-num.damage{color:#ff4757}.float-num.crit{color:#ffd32a;font-size:18px;text-shadow:0 0 8px rgba(255,211,42,.6)}
.float-num.heal{color:#2ed573}.float-num.shield-num{color:#54a0ff}
.float-num.dodge{color:#a4b0be;font-size:11px;font-style:italic}
.float-num.miss{color:#636e72;font-size:11px}
.float-num.skill-name{color:#d4a0ff;font-size:12px;font-weight:bold}
.float-num.buff-text{color:#70a1ff;font-size:10px}
.float-num.debuff-text{color:#ff7979;font-size:10px}
@keyframes floatUp{0%{opacity:1;top:10%}20%{opacity:1}100%{opacity:0;top:-25%}}

/* 技能全屏特效 */
.skill-effect-overlay{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:50;display:flex;align-items:center;justify-content:center}
.skill-effect-text{font-size:18px;font-weight:900;animation:skillFlash .8s ease-out forwards;text-shadow:0 0 20px currentColor}
@keyframes skillFlash{0%{opacity:0;transform:scale(.5)}20%{opacity:1;transform:scale(1.2)}40%{transform:scale(1)}80%{opacity:1}100%{opacity:0;transform:scale(1.1)}}
.skill-effect-overlay.fire .skill-effect-text{color:#ff6348}
.skill-effect-overlay.ice .skill-effect-text{color:#74b9ff}
.skill-effect-overlay.dark .skill-effect-text{color:#6c5ce7}
.skill-effect-overlay.holy .skill-effect-text{color:#ffeaa7}
.skill-effect-overlay.poison .skill-effect-text{color:#00b894}
.skill-effect-overlay.heal-effect .skill-effect-text{color:#55efc4}
.skill-effect-overlay.shield-effect .skill-effect-text{color:#74b9ff}

/* 战斗日志 */
#battle-log{font-size:10px;line-height:1.6;max-height:140px;overflow-y:auto;padding:6px 8px;background:#08080f;border-radius:6px;border:1px solid var(--border);scrollbar-width:thin;scrollbar-color:var(--border) transparent;-webkit-overflow-scrolling:touch}
#battle-log::-webkit-scrollbar{width:3px}
#battle-log::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* 编队网格 - 自动换行 */
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(min-width:480px){.team-grid{grid-template-columns:repeat(6,1fr)}}
.team-slot{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center;min-height:100px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.team-slot:active{border-color:var(--gold);border-style:solid}
.team-slot[data-empty]{border-style:dashed}
.log-line{padding:1px 0;animation:fadeIn .3s}
.log-damage{color:#e74c3c}.log-heal{color:#2ecc71}.log-buff{color:#3498db}.log-debuff{color:#e67e22}
.log-crit{color:#f1c40f;font-weight:bold}.log-death{color:#888;font-style:italic}.log-info{color:var(--text2)}
.log-skill{color:#9b59b6;font-weight:bold}.log-title{color:var(--gold);font-weight:bold;font-size:12px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* 合成区域 */
.merge-slots{display:flex;gap:8px;margin:8px 0;justify-content:center;flex-wrap:wrap}
.merge-slot{width:68px;height:68px;border:2px dashed var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:all .2s;background:var(--panel2);position:relative}
.merge-slot:active{border-color:var(--gold)}
.merge-slot.filled{border-style:solid}
.merge-arrow{font-size:20px;color:var(--gold);align-self:center}
.merge-result{width:76px;height:76px;border:2px solid var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:28px;background:rgba(201,162,39,.1);position:relative}

/* 建筑卡片 */
.building-card{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:6px;display:flex;gap:8px;align-items:center}
.building-card:active{border-color:var(--gold)}
.building-icon{font-size:28px;width:44px;text-align:center;flex-shrink:0}
.building-info{flex:1;min-width:0}
.building-name{font-size:13px;font-weight:bold;color:var(--gold)}
.building-desc{font-size:10px;color:var(--text2);margin-top:1px}
.building-level{font-size:10px;color:var(--blue);margin-top:1px}

/* 关卡地图 */
.stage-node{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;background:var(--panel2);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .2s;margin:3px;font-size:12px}
.stage-node:active{border-color:var(--gold)}
.stage-node.cleared{border-color:var(--green);opacity:.7}
.stage-node.current{border-color:var(--gold);box-shadow:0 0 6px rgba(201,162,39,.3)}
.stage-node.locked{opacity:.3;cursor:not-allowed}
.stage-node .stage-icon{font-size:16px}

/* 装备 */
.equip-slot{background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:5px 8px;margin:3px 0;display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer}
.equip-slot:active{border-color:var(--gold)}
.equip-icon{font-size:16px}
.equip-name{flex:1;min-width:0}
.equip-stats{color:var(--green);font-size:10px}

/* 模态框 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:10px}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto}
.modal-title{color:var(--gold);font-size:14px;font-weight:bold;margin-bottom:10px}

/* Toast */
.toast{position:fixed;top:50px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--gold);color:var(--gold);padding:8px 16px;border-radius:6px;z-index:200;animation:fadeIn .3s;font-size:12px;box-shadow:0 4px 12px rgba(0,0,0,.5);white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}

/* 网格布局 */
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.flex-center{display:flex;align-items:center;justify-content:center}
.text-gold{color:var(--gold)}.text-red{color:var(--red)}.text-green{color:var(--green)}.text-blue{color:var(--blue)}.text-purple{color:var(--purple)}
.text-dim{color:var(--text2)}.text-sm{font-size:11px}.text-xs{font-size:10px}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mb-8{margin-bottom:8px}
.gap-4{gap:4px}.gap-8{gap:8px}
.hidden{display:none!important}
.tab-bar{display:flex;gap:4px;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:4px;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:4px 10px;border:1px solid transparent;background:transparent;color:var(--text2);cursor:pointer;border-radius:4px 4px 0 0;font-size:12px;font-family:inherit;white-space:nowrap;touch-action:manipulation}
.tab-btn:active{color:var(--text)}
.tab-btn.active{color:var(--gold);border-color:var(--border);border-bottom-color:var(--panel);background:var(--panel)}

/* ===== 桌面端覆盖 ===== */
@media(min-width:769px){
  #app{flex-direction:row}
  #sidebar{position:static;height:100vh;width:56px;background:var(--panel);border-right:1px solid var(--border);border-top:none;display:flex;flex-direction:column;align-items:center;padding-top:10px;gap:4px;justify-content:flex-start}
  #sidebar .nav-btn{width:46px;height:46px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;border-radius:6px;font-size:20px;display:flex;align-items:center;justify-content:center;flex:none;padding:0}
  #sidebar .nav-btn:hover,#sidebar .nav-btn.active{background:var(--panel2);color:var(--gold);border-color:var(--gold)}
  #sidebar .nav-btn .nav-icon{font-size:20px}
  #main{padding-bottom:0}
  #top-bar{height:40px;padding:0 16px;gap:20px}
  .panel{padding:14px;margin-bottom:12px}
  .grid-2{grid-template-columns:1fr 1fr;gap:10px}
  .grid-3{grid-template-columns:1fr 1fr 1fr;gap:10px}

// 关卡难度配置
const STAGE_CONFIG = {
  // 每20关一个周期（周目）
  cycleLength: 20,
  // 等级曲线: 基础等级 + 周期加成 + 位置加成
  baseLevel: function(id, cycle, posInCycle) {
    return 1 + Math.floor(id * 0.8) + cycle * 3 + Math.floor(posInCycle / 5);
  },
  // 敌人数: 从1个逐渐增加到6个
  enemyCount: function(posInCycle, isBoss, isFinalBoss) {
    if (isFinalBoss) return 6;
    if (isBoss) return 4;
    return Math.min(6, 1 + Math.floor((posInCycle - 1) / 3));
  },
  // 品质曲线: 普通→稀有→史诗→传说→神话
  qualityCurve: function(cycle, posInCycle, isBoss, isFinalBoss) {
    var qIdx = cycle;
    if (isFinalBoss) qIdx = Math.min(4, cycle + 2);
    else if (isBoss) qIdx = Math.min(4, cycle + 1);
    else qIdx = Math.min(4, cycle + Math.floor(posInCycle / 10));
    return QUALITIES[qIdx] || 'common';
  },
  // 技能数量: 随进度增加
  skillCount: function(cycle, posInCycle, isBoss) {
    if (isBoss) return 3;
    return Math.min(3, 1 + Math.floor(cycle / 2) + Math.floor(posInCycle / 10));
  }
};

function generateStage(id){
  var cycle=Math.floor((id-1)/STAGE_CONFIG.cycleLength);
  var posInCycle=((id-1)%STAGE_CONFIG.cycleLength)+1;
  var isBoss=(posInCycle%5===0);
  var isFinalBoss=(posInCycle===STAGE_CONFIG.cycleLength);
  var baseLevel=STAGE_CONFIG.baseLevel(id,cycle,posInCycle);
  var areaIdx=cycle%AREA_THEMES.length;
  var theme=AREA_THEMES[areaIdx];
  var enemyQuality=STAGE_CONFIG.qualityCurve(cycle,posInCycle,isBoss,isFinalBoss);
  var bossQuality=isFinalBoss?'mythic':STAGE_CONFIG.qualityCurve(cycle,posInCycle,true,false);
  
  var enemies=[];
  var nameSuffix=' 第'+Math.ceil(posInCycle/5)+'层';
  
  if(isFinalBoss){
    // 最终Boss: 6人完整阵容，高品质
    var bi=cycle%BOSS_NAMES.length;
    enemies.push({name:BOSS_NAMES[bi].name,icon:BOSS_NAMES[bi].icon,role:BOSS_NAMES[bi].role,quality:'mythic',level:baseLevel+5,skills:pickRandomSkills(BOSS_NAMES[bi].role,3)});
    enemies.push({name:'深渊守卫',icon:'🗿',role:'guardian',quality:'legendary',level:baseLevel+3,skills:pickRandomSkills('guardian',3)});
    enemies.push({name:'暗影刺客',icon:'👤',role:'assassin',quality:'legendary',level:baseLevel+3,skills:pickRandomSkills('assassin',3)});
    enemies.push({name:'混沌法师',icon:'🔮',role:'mage',quality:'legendary',level:baseLevel+3,skills:pickRandomSkills('mage',3)});
    enemies.push({name:'虚空祭司',icon:'👁️',role:'warlock',quality:'epic',level:baseLevel+2,skills:pickRandomSkills('warlock',2)});
    enemies.push({name:'黑暗医师',icon:'💀',role:'healer',quality:'epic',level:baseLevel+2,skills:pickRandomSkills('healer',2)});
  }else if(isBoss){
    // 小Boss: 4人阵容
    var bi=cycle%BOSS_NAMES.length;
    enemies.push({name:BOSS_NAMES[bi].name,icon:BOSS_NAMES[bi].icon,role:BOSS_NAMES[bi].role,quality:bossQuality,level:baseLevel+3,skills:pickRandomSkills(BOSS_NAMES[bi].role,3)});
    enemies.push({name:'精英守卫',icon:'🛡️',role:'guardian',quality:enemyQuality,level:baseLevel+1,skills:pickRandomSkills('guardian',2)});
    enemies.push({name:'暗影法师',icon:'👻',role:'mage',quality:enemyQuality,level:baseLevel+1,skills:pickRandomSkills('mage',2)});
    enemies.push({name:'黑暗医师',icon:'💀',role:'healer',quality:enemyQuality,level:baseLevel,skills:pickRandomSkills('healer',1)});
  }else{
    // 普通关卡: 根据位置决定人数和阵容
    var count=STAGE_CONFIG.enemyCount(posInCycle,isBoss,isFinalBoss);
    var formation=ENEMY_FORMATIONS[Math.min(count-1,ENEMY_FORMATIONS.length-1)];
    var ei=(cycle+Math.floor(posInCycle/3))%ENEMY_NAMES.length;
    var en=ENEMY_NAMES[ei];
    
    // 确保有前排
    var hasTank=false;
    for(var i=0;i<count;i++){
      var role;
      if(i===0 && count>=2){
        // 第一个位置优先坦克
        role=Math.random()<0.7?'guardian':(Math.random()<0.5?'warrior':'paladin');
        hasTank=true;
      }else{
        // 其他位置按阵容权重随机
        var pool=formation;
        var totalWeight=pool.reduce(function(s,r){return s+r.weight},0);
        var rand=Math.random()*totalWeight;
        var cumWeight=0;
        for(var j=0;j<pool.length;j++){
          cumWeight+=pool[j].weight;
          if(rand<=cumWeight){role=pool[j].role;break;}
        }
        if(!role)role=pool[0].role;
      }
      
      // 根据位置调整等级（前排等级略高）
      var lvlOffset=(role==='guardian'||role==='paladin')?1:0;
      var ni=i%en.names.length;
      enemies.push({
        name:en.names[ni],
        icon:en.icon[ni],
        role:role,
        quality:enemyQuality,
        level:baseLevel+lvlOffset,
        skills:pickRandomSkills(role,STAGE_CONFIG.skillCount(cycle,posInCycle,isBoss))
      });
    }
  }

  // 奖励计算：与当前资源挂钩（资源越少奖励越多，鼓励消耗）
  var difficultyMult=1+cycle*0.3+(isBoss?0.5:0)+(isFinalBoss?1:0);
  
  // 计算资源比例（越少奖励越多，最多2倍加成）
  var goldRatio=(G.resources.gold||0)/RESOURCE_LIMITS.gold;
  var foodRatio=(G.resources.food||0)/RESOURCE_LIMITS.food;
  var stoneRatio=(G.resources.stone||0)/RESOURCE_LIMITS.stone;
  var ironRatio=(G.resources.iron||0)/RESOURCE_LIMITS.iron;
  
  // 资源稀缺加成：0资源=2倍，满资源=0.5倍
  var goldBonus=2-Math.min(goldRatio*1.5,1.5);
  var resourceBonus=2-Math.min((foodRatio+stoneRatio+ironRatio)/3*1.5,1.5);
  
  // 金币/经验：与金币存量挂钩（金币少时奖励多）
  var baseGold=Math.floor((60+id*20)*difficultyMult*(1/(1+cycle*0.2)));
  var goldR=Math.floor(baseGold*goldBonus);
  var expR=Math.floor((25+id*10)*difficultyMult*(1/(1+cycle*0.15))*goldBonus);
  
  // 石材/草药/铁矿：与资源存量挂钩（资源少时奖励多）
  var stoneR=Math.floor((15+id*4)*difficultyMult*(1/(1+cycle*0.3))*resourceBonus);
  var herbsR=Math.floor(id*1.5*difficultyMult*(1/(1+cycle*0.25))*resourceBonus);
  var ironR=Math.floor((8+id*2)*difficultyMult*(1/(1+cycle*0.35))*resourceBonus);
  
  // 宝石：BOSS掉落，与宝石存量挂钩（宝石少时掉落多）
  var gemsR=0;
  if(isBoss){
    var gemRatio=(G.resources.gems||0)/RESOURCE_LIMITS.gems;
    var gemBonus=2-Math.min(gemRatio*1.5,1.5);
    if(isFinalBoss){
      gemsR=Math.floor((3+Math.min(cycle*1.5,5))*gemBonus); // 最终BOSS：3-8宝石
    }else{
      gemsR=Math.floor((1+Math.min(cycle*0.8,2))*gemBonus); // 小BOSS：1-3宝石
    }
  }

  return {
    id:id,
    name:(isFinalBoss?'★★★ ':isBoss?'★ ':'')+theme.prefix+theme.suffix+nameSuffix,
    icon:theme.icon,
    desc:'第'+(cycle+1)+'章 第'+posInCycle+'关 · 敌人'+enemies.length+'人',
    isBoss:isBoss,
    bossType:isFinalBoss?'final':isBoss?'mini':null,
    enemies:enemies,
    rewards:{gold:goldR,exp:expR,stone:stoneR,herbs:herbsR,iron:ironR,gems:gemsR}
  };
}

function pickRandomSkills(role,count){
  var all={
    warrior:['cleave','shield_bash','berserker'],
    guardian:['taunt','iron_wall','shield_bash'],
    mage:['fireball','blizzard','arcane_shield','soul_burn'],
    healer:['heal','group_heal','purify','divine_shield'],
    assassin:['backstab','shadow_step','poison_blade'],
    ranger:['aimed_shot','rain_arrows','trap'],
    warlock:['curse','life_drain','soul_burn'],
    paladin:['holy_strike','divine_shield','holy_light'],
  };
  var pool=all[role]||all.warrior;
  var result=[];
  var shuffled=pool.slice().sort(function(){return Math.random()-0.5});
  for(var i=0;i<Math.min(count,shuffled.length);i++)result.push(shuffled[i]);
  return result;
}

const SAVE_KEY='shadow_dungeon_save';

function saveGame(){

function loadGame(){
  try{
    var raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return false;
    var data=JSON.parse(raw);
    // 恢复英雄ID计数器
    G.heroIdCounter=data.heroIdCounter||0;
    // 恢复游戏状态（保留引用）
    var saved=data.g;
    Object.keys(saved).forEach(function(k){G[k]=saved[k]});
    // 恢复竞技场每日重置
    var today=new Date().toDateString();
    if(G.arenaState&&G.arenaState.lastChallengeDate!==today){
      G.arenaState.dailyChallengesUsed=0;
      G.arenaState.lastChallengeDate=today;
    }
    return true;
  }catch(e){console.error('读档失败',e);return false;}
}

function createHero(templateId,level=1){
  const tpl=HERO_TEMPLATES.find(t=>t.id===templateId);
  if(!tpl)return null;
  const role=ROLES[tpl.role];
  const qm=QUALITY_MULT[tpl.quality];
  const hero={
    uid: ++G.heroIdCounter,
    id:tpl.id, name:tpl.name, icon:tpl.icon,
    role:tpl.role, quality:tpl.quality,
    level:level, exp:0,
    maxHP: calcStat(role.baseHP, qm, level),
    hp:0,
    atk: calcStat(role.baseATK, qm, level),
    def: calcStat(role.baseDEF, qm, level),
    spd: calcStat(role.baseSPD, qm, level),
    maxMP: calcStat(role.baseMP, qm, level),
    mp:0,
    skills: [...tpl.skills],
    equipment:{weapon:null,armor:null,accessory:null},
    lore: tpl.lore,
    bonusSkills:[],
    deathDefyUsed: false,
  };
  hero.hp=hero.maxHP;
  hero.mp=hero.maxMP;
  return hero;
}

function getHeroStats(hero){
  let s={hp:hero.hp,maxHP:hero.maxHP,atk:hero.atk,def:hero.def,spd:hero.spd,mp:hero.mp,maxMP:hero.maxMP};
  // 装备加成
  for(let slot of ['weapon','armor','accessory']){
    const eid=hero.equipment[slot];
    if(eid!=null){
      const eq=G.equipment.find(e=>e.uid===eid);
      if(eq){
        const tpl=EQUIP_TEMPLATES.find(t=>t.id===eq.id);
        if(tpl){
          for(let[k,v]of Object.entries(tpl.stats)){
            if(s[k]!==undefined)s[k]+=v;
          }
        }
      }
    }
  }
  return s;
}

  stone: 3000,      // 石材上限
  iron: 1500,       // 铁矿上限
  fame: 999         // 声望上限

function produceResources(){
  var now=Date.now();
  var minutesPassed=(now-G_lastProductionTime)/(1000*60);
  if(minutesPassed<0.02)return; // 小于1秒不计算
  
  // 农场产出食物（配置是每小时产量，转换为每分钟）
  var farmLevel=G.buildings.farm||0;
  if(farmLevel>0){
    var farmDef=BUILDING_DEFS.farm;
    var foodPerHour=farmDef.foodProductionByLevel[farmLevel]||0;
    var foodPerMinute=foodPerHour/60;
    var foodProduced=Math.floor(foodPerMinute*minutesPassed);
    if(foodProduced>0){
      var before=G.resources.food||0;
      G.resources.food=Math.min((G.resources.food||0)+foodProduced, RESOURCE_LIMITS.food);
      var actual=G.resources.food-before;
      if(actual>0) showToast('🌾 农场产出 '+actual+' 食物'+(G.resources.food>=RESOURCE_LIMITS.food?' (已满)':''));
    }
  }
  
  // 矿场产出石材和铁矿（配置是每小时产量，转换为每分钟）
  var mineLevel=G.buildings.mine||0;
  if(mineLevel>0){
    var mineDef=BUILDING_DEFS.mine;
    var stonePerHour=mineDef.stoneProductionByLevel[mineLevel]||0;
    var ironPerHour=mineDef.ironProductionByLevel[mineLevel]||0;
    var stonePerMinute=stonePerHour/60;
    var ironPerMinute=ironPerHour/60;
    var stoneProduced=Math.floor(stonePerMinute*minutesPassed);
    var ironProduced=Math.floor(ironPerMinute*minutesPassed);
    
    var stoneBefore=G.resources.stone||0;
    var ironBefore=G.resources.iron||0;
    
    if(stoneProduced>0){
      G.resources.stone=Math.min((G.resources.stone||0)+stoneProduced, RESOURCE_LIMITS.stone);
    }
    if(ironProduced>0){
      G.resources.iron=Math.min((G.resources.iron||0)+ironProduced, RESOURCE_LIMITS.iron);
    }
    
    var stoneActual=(G.resources.stone||0)-stoneBefore;
    var ironActual=(G.resources.iron||0)-ironBefore;
    
    if(stoneActual>0||ironActual>0){
      var fullMsg='';
      if(G.resources.stone>=RESOURCE_LIMITS.stone) fullMsg+=' 石材已满';
      if(G.resources.iron>=RESOURCE_LIMITS.iron) fullMsg+=' 铁矿已满';
      showToast('⛏️ 矿场产出 '+stoneActual+' 石材 '+ironActual+' 铁矿'+fullMsg);
    }
  }
  
  G_lastProductionTime=now;
  updateResUI();
}

function getArenaDailyLimit(){
  var arenaLevel=G.buildings.arena||0;
  if(arenaLevel===0)return 0;
  return ARENA_CONFIG.dailyChallengesByLevel[arenaLevel]||0;
}

function getArenaRemainingChallenges(){
  var limit=getArenaDailyLimit();
  // 检查是否跨天重置
  var today=new Date().toDateString();
  if(G.arenaState.lastChallengeDate!==today){
    G.arenaState.dailyChallengesUsed=0;
    G.arenaState.lastChallengeDate=today;
  }
  return Math.max(0,limit-G.arenaState.dailyChallengesUsed);
}

function generateArenaOpponent(difficulty){
  // 获取玩家队伍信息
  var teamHeroes=G.team.filter(function(h){return h!==null});
  var teamSize=teamHeroes.length;
  if(teamSize===0)teamSize=1;
  
  // 计算玩家队伍平均等级和品质
  var totalLevel=0;
  var totalQuality=0;
  var maxPlayerLevel=0;
  teamHeroes.forEach(function(h){
    totalLevel+=h.level;
    totalQuality+=QUALITIES.indexOf(h.quality);
    if(h.level>maxPlayerLevel)maxPlayerLevel=h.level;
  });
  var avgPlayerLevel=Math.floor(totalLevel/teamSize);
  var avgPlayerQuality=Math.floor(totalQuality/teamSize);
  if(avgPlayerLevel===0)avgPlayerLevel=1;
  
  // 根据难度调整基础等级
  var levelMultiplier={easy:0.6,normal:0.9,hard:1.2};
  var baseLevel=Math.floor(avgPlayerLevel*levelMultiplier[difficulty]);
  baseLevel=Math.max(1,baseLevel);
  
  // 根据难度调整品质上限
  var maxQualityIdx={easy:1,normal:3,hard:4}[difficulty]||2; // easy=稀有,normal=史诗,hard=传说
  
  // 对手人数与玩家队伍相同（最少2人，最多4人）
  var opponentCount=Math.min(Math.max(teamSize,2),4);
  
  // 生成对手
  var opponents=[];
  for(var i=0;i<opponentCount;i++){
    // 根据难度选择品质
    var qualityIdx=Math.min(maxQualityIdx,avgPlayerQuality+rand(-1,1));
    qualityIdx=Math.max(0,Math.min(qualityIdx,QUALITIES.length-1));
    var quality=QUALITIES[qualityIdx];
    
    // 选择该品质的英雄模板
    var pool=HERO_TEMPLATES.filter(function(t){return t.quality===quality});
    if(pool.length===0)pool=HERO_TEMPLATES;
    var tpl=pick(pool);
    
    var role=ROLES[tpl.role];
    var qm=QUALITY_MULT[tpl.quality];
    
    // 等级有随机波动
    var levelVariation=rand(-2,3);
    var opponentLevel=Math.max(1,baseLevel+levelVariation);
    
    opponents.push({
      name:tpl.name,
      icon:tpl.icon,
      quality:tpl.quality,
      role:tpl.role,
      level:opponentLevel,
      hp:calcStat(role.baseHP,qm,opponentLevel),
      maxHP:calcStat(role.baseHP,qm,opponentLevel),
      atk:calcStat(role.baseATK,qm,opponentLevel),
      def:calcStat(role.baseDEF,qm,opponentLevel),
      spd:calcStat(role.baseSPD,qm,opponentLevel),
      mp:calcStat(role.baseMP,qm,opponentLevel),
      maxMP:calcStat(role.baseMP,qm,opponentLevel),
      skills:tpl.skills,
      alive:true,
      isEnemy:true,
    });
  }
  return opponents;
}

function calculateArenaReward(opponents,difficulty,isWin){
  if(!isWin)return{gold:0,fame:0};
  
  // 计算对手平均等级和品质
  var totalLevel=0;
  var totalQuality=0;
  opponents.forEach(function(o){
    totalLevel+=o.level;
    totalQuality+=QUALITIES.indexOf(o.quality);
  });
  var avgLevel=Math.floor(totalLevel/opponents.length);
  var avgQuality=Math.floor(totalQuality/opponents.length);
  
  var baseGold=ARENA_CONFIG.baseGoldReward;
  var baseFame=ARENA_CONFIG.baseFameReward;
  var diffMult=ARENA_CONFIG.difficultyMultiplier[difficulty]||1;
  
  // 根据对手等级和品质计算奖励
  var levelBonus=1+(avgLevel/100);
  var qualityBonus=1+(avgQuality*0.1); // 品质每高一级+10%
  var countBonus=opponents.length*0.2; // 每多一个对手+20%
  
  var gold=Math.floor(baseGold*levelBonus*qualityBonus*(1+countBonus)*diffMult);
  var fame=Math.floor(baseFame*levelBonus*qualityBonus*(1+countBonus)*diffMult);
  
  // 连胜加成（使用配置）
  var winStreak=G.arenaState.winStreak;
  var streakBonus=0;
  var streakThresholds=Object.keys(ARENA_CONFIG.winStreakBonus).map(Number).sort(function(a,b){return b-a});
  for(var i=0;i<streakThresholds.length;i++){
    if(winStreak>=streakThresholds[i]){streakBonus=ARENA_CONFIG.winStreakBonus[streakThresholds[i]];break;}
  }
  
  gold=Math.floor(gold*(1+streakBonus));
  fame=Math.floor(fame*(1+streakBonus));
  
  return{gold:gold,fame:fame};
}

function startArenaBattle(difficulty){
  var remaining=getArenaRemainingChallenges();
  if(remaining<=0){showToast('今日挑战次数已用完');return}
  
  // 检查是否有队伍
  var teamHeroes=G.team.filter(function(h){return h!==null});
  if(teamHeroes.length===0){showToast('请先编组队伍');return}
  
  // 生成对手
  var opponents=generateArenaOpponent(difficulty);
  
  // 保存竞技场信息供战斗结束后结算
  G.arenaBattleInfo={
    difficulty:difficulty,
    opponents:opponents
  };
  
  // 启动竞技场战斗
  runArenaBattle(teamHeroes,opponents,difficulty);
}

        else if(chosenSkill.name.indexOf('暗')>=0||chosenSkill.name.indexOf('诅咒')>=0||chosenSkill.name.indexOf('灵魂')>=0)effectClass='dark';
        else if(chosenSkill.name.indexOf('圣')>=0||chosenSkill.name.indexOf('光')>=0||chosenSkill.name.indexOf('净化')>=0)effectClass='holy';
        else if(chosenSkill.name.indexOf('毒')>=0)effectClass='poison';
        else if(chosenSkill.type==='heal'||chosenSkill.type==='cleanse')effectClass='heal-effect';
        else if(chosenSkill.type==='shield')effectClass='shield-effect';
        
        showSkillEffect(chosenSkill.icon,chosenSkill.name,effectClass);
        showFloat(unit,chosenSkill.icon+chosenSkill.name,'skill-name');
        await sleep(400);
        
        var target=getValidTarget(unit,allUnits,chosenSkill.target);
        if(target){

        }
      }else{

        if(target){
          var r=calcDamage(unit,target,null);
          if(r.dodged){
            log(unit.icon+' '+unit.name+' 攻击 '+target.icon+target.name+'，但被闪避了！','info');
            showFloat(target,'闪避!','dodge');
            recordBattleStat(target,'dodge',1);
          }else{
            var dmg=r.dmg;
            if(target.shield>0){var absorbed=Math.min(target.shield,dmg);target.shield-=absorbed;dmg-=absorbed;if(absorbed>0)showFloat(target,'🛡-'+absorbed,'shield-num')}
            target.hp=Math.max(0,target.hp-dmg);
            log(unit.icon+' '+unit.name+' 攻击 '+target.icon+target.name+'，造成 '+dmg+' 点伤害'+(r.crit?' 💥暴击！':''),r.crit?'crit':'damage');
            showFloat(target,(r.crit?'💥':'')+dmg,r.crit?'crit':'damage');
            animUnit(target,'hit',300);
            recordBattleStat(unit,'damage',dmg);
            recordBattleStat(target,'damageTaken',dmg);
            if(r.crit)recordBattleStat(unit,'crit',1);
            if(target.hp<=0){target.alive=false;log(target.icon+' '+target.name+' 倒下了...','death');animUnit(target,'dying',700)}
          }
        }
      }
      
      renderTeams();
      updateBattleStatsBoard();
      await sleep(500/G_battleSpeed);
    }
    
    renderTeams();
    
    // 检查胜负
    var playerAlive=playerUnits.filter(function(u){return u.alive}).length;
    var enemyAlive=enemyUnits.filter(function(u){return u.alive}).length;
    
    if(playerAlive===0||enemyAlive===0){
      G_battleRunning=false;
      break;
    }
    
    await sleep(300/G_battleSpeed);
  }
  
  // 战斗结束 - 检查是否被中途退出打断
  if(!G.arenaBattleInfo){return;}
  
  var playerAlive=playerUnits.filter(function(u){return u.alive}).length;
  var enemyAlive=enemyUnits.filter(function(u){return u.alive}).length;
  var isWin=playerAlive>0&&enemyAlive===0;
  
  // 【关键】立即保存胜负结果和奖励，防止用户在 await 间隙点退出
  G.arenaIsWin=isWin;
  G.arenaReward=calculateArenaReward(G.arenaBattleInfo.opponents,G.arenaBattleInfo.difficulty,isWin);
  
  await finishArenaBattle(isWin,playerUnits,enemyUnits);
}

async function finishArenaBattle(isWin,playerUnits,enemyUnits){
  updateResUI();
  saveGame();
  renderTeams();
  G_battleRunning=false;
  G_battlePaused=false;
  
  // 保存胜负结果到全局
  G.arenaIsWin=isWin;
  
  // 计算奖励
  var info=G.arenaBattleInfo;
  var difficulty=info.difficulty;
  var opponents=info.opponents;
  var reward=calculateArenaReward(opponents,difficulty,isWin);
  G.arenaReward=reward;
  
  // 显示结算提示（通过Toast）
  if(isWin){
    showToast('🎉 竞技场胜利！获得 💰'+reward.gold+' 🏆'+reward.fame);
  }else{
    showToast('💀 竞技场失败...');
  }
  
  // 显示战斗结果面板（动画效果）+ 短暂延迟后自动回到竞技场
  var btnArea=document.getElementById('arena-battle-buttons');
  if(btnArea){
    var resultText=isWin?'<span class="text-gold" style="font-size:20px;font-weight:bold">🎉 竞技场胜利！</span>':'<span class="text-red" style="font-size:20px;font-weight:bold">💀 竞技场失败...</span>';
    var rewardText=isWin?'<div style="text-align:center;margin:12px 0;color:#ffd700;font-size:16px">奖励: 💰'+reward.gold+' 🏆'+reward.fame+'</div>':'';
    var streakText=isWin?'<div style="text-align:center;margin:8px 0;color:#2ed573">连胜: '+G.arenaState.winStreak+'</div>':'';
    btnArea.innerHTML='<div style="margin:20px 0;text-align:center;padding:20px;background:rgba(0,0,0,0.3);border-radius:10px">'+resultText+rewardText+streakText+'</div>';
  }
  
  // 自动结算（延迟后返回竞技场）
  G.arenaSettleTimer=setTimeout(function(){
    showArenaResult();
  }, 1500);
}

  var reward=G.arenaReward||{gold:0,fame:0};
  
  // 更新状态
  G.arenaState.dailyChallengesUsed++;
  
  if(isWin){
    G.arenaState.winStreak++;
    G.arenaState.totalWins++;
    G.resources.gold+=reward.gold;
    G.resources.fame+=reward.fame;

    :'<div style="text-align:center;margin:8px 0;color:var(--red)">连胜已重置</div>')+
    '<div style="margin-top:12px;padding:10px;background:rgba(0,0,0,0.3);border-radius:6px">'+
    '<div style="font-weight:bold;font-size:12px;margin-bottom:6px;color:var(--gold)">📊 战斗数据汇总</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px">'+
    '<span>⚔️ 总伤害: <b style="color:#ff6b6b">'+totalDamage+'</b></span>'+
    '<span>💥 暴击次数: <b style="color:#ff4757">'+totalCrit+'</b></span>'+

    '<span style="grid-column:span 2;color:var(--text2)">🏅 最高输出: '+maxDamageUnit+' ('+maxDamage+')</span>'+

}

function toggleArenaPause(){
  G_battlePaused=!G_battlePaused;
  // 查找控制栏中的暂停/继续按钮
  var allBtns=document.querySelectorAll('.panel .btn-group .btn');
  for(var i=0;i<allBtns.length;i++){
    var txt=allBtns[i].textContent;
    if(txt.indexOf('⏸️')>=0||txt.indexOf('▶️')>=0||txt.indexOf('暂停')>=0||txt.indexOf('继续')>=0){
      allBtns[i].textContent=G_battlePaused?'▶️ 继续':'⏸️ 暂停';
      allBtns[i].classList.toggle('btn-primary',G_battlePaused);
      break;
    }
  }
}

function setArenaSpeed(speed){
  G_battleSpeed=speed;
  showToast('战斗速度: x'+speed);
}

function exitArenaBattle(){
  // 清除自动结算定时器
  if(G.arenaSettleTimer){clearTimeout(G.arenaSettleTimer);G.arenaSettleTimer=null;}
  
  // 战斗还在进行中 → 根据实际战斗状态判断胜负
  if(G_battleRunning){
    var actualWin=false;
    if(G.arenaBattleUnits){
      var pAlive=G.arenaBattleUnits.playerUnits.filter(function(u){return u.alive}).length;
      var eAlive=G.arenaBattleUnits.enemyUnits.filter(function(u){return u.alive}).length;
      actualWin=pAlive>0&&eAlive===0;
    }
    if(actualWin){
      // 敌人都死了，是胜利，让 async runArenaBattle 自己检测并结算
      G_battleRunning=false;
      G_battlePaused=false;
      showToast('🎉 战斗胜利，正在结算...');
      return;
    }
    // 真的还在打或在失败边缘 → 确认退出视为失败
    if(!confirm('确定要退出竞技场战斗吗？\n此次挑战次数将扣除，并视为失败。'))return;
    G_battleRunning=false;
    G_battlePaused=false;
    _battleScene=null;
    G.arenaIsWin=false;
    G.arenaReward={gold:0,fame:0};
    showArenaResult();
    return;
  }
  
  // 战斗已自然结束 → 直接结算返回竞技场（信任已有的G.arenaIsWin）
  _battleScene=null;
  if(G.arenaBattleInfo){
    showArenaResult();
  }else{
    showToast('返回竞技场');
    var contentEl=document.getElementById('content');
    if(contentEl)renderArena(contentEl);
  }
}

function getHeroLevelCap(){
  var templeLevel=G.buildings.temple||0;
  var templeDef=BUILDING_DEFS.temple;
  return templeDef.heroLevelCapByLevel[templeLevel]||20;
}

function getExpToLevel(level){return Math.floor(50*Math.pow(1.25,level-1))}

function addHeroExp(hero,amount){
  var levelCap=getHeroLevelCap();
  if(hero.level>=levelCap)return false;
  hero.exp+=amount;
  let leveled=false;
  while(hero.exp>=getExpToLevel(hero.level)&&hero.level<levelCap){
    hero.exp-=getExpToLevel(hero.level);
    hero.level++;
    leveled=true;
    const role=ROLES[hero.role];const qm=QUALITY_MULT[hero.quality];
    hero.maxHP=calcStat(role.baseHP, qm, hero.level);
    hero.atk=calcStat(role.baseATK, qm, hero.level);
    hero.def=calcStat(role.baseDEF, qm, hero.level);
    hero.spd=calcStat(role.baseSPD, qm, hero.level);
    hero.maxMP=calcStat(role.baseMP, qm, hero.level);
    hero.hp=hero.maxHP;hero.mp=hero.maxMP;
  }
  // 超出上限的经验清零
  if(hero.level>=levelCap)hero.exp=0;
  return leveled;
}

// ==================== 战斗引擎 ====================
function createBattleUnit(hero,isEnemy=false){
  const stats=getHeroStats(hero);
  return{
    hero:hero, isEnemy:isEnemy,
    name:hero.name, icon:hero.icon,
    hp:stats.maxHP, maxHP:stats.maxHP,
    mp:stats.maxMP, maxMP:stats.maxMP,
    atk:stats.atk, def:stats.def, spd:stats.spd,
    alive:true, shield:0,
    buffs:[], cooldowns:{},
    dot:[], // 持续伤害
    bonusSkills: hero.bonusSkills||[],
  };
}

function calcDamage(attacker,defender,skill=null){
  // 金手指：一击必杀（玩家攻击时）
  if(G_cheats.enabled && G_cheats.oneHitKill && !attacker.isEnemy){
    return{dmg:999999,crit:true,dodged:false};
  }
  // 金手指：无敌（玩家受击时）
  if(G_cheats.enabled && G_cheats.godMode && !defender.isEnemy){
    return{dmg:0,crit:false,dodged:true};
  }
  let atk=attacker.atk;
  let def=defender.def;
  
  // 获取职业数据
  const attackerRole=ROLES[attacker.role];
  const defenderRole=ROLES[defender.role];
  
  // buff/debuff
  attacker.buffs.forEach(b=>{if(b.stat==='atk')atk=Math.floor(atk*b.mult)});
  defender.buffs.forEach(b=>{if(b.stat==='def')def=Math.floor(def*b.mult)});
  
  // ===== 职业机制 =====
  
  // 战士：狂怒 - 生命值低于30%时攻击力提升50%
  if(attacker.role==='warrior' && attacker.hp/attacker.maxHP<0.3){
    atk=Math.floor(atk*1.5);
  }
  
  // 守护者：铁壁 - 受到伤害减少20%
  if(defender.role==='guardian'){
    def=Math.floor(def*1.2);
  }
  
  // 法师：奥术精通 - 技能伤害提升30%
  if(attacker.role==='mage' && skill){
    atk=Math.floor(atk*1.3);
  }
  
  // 游侠：精准 - 攻击无视目标20%防御
  if(attacker.role==='ranger'){
    def=Math.floor(def*0.8);
  }
  
  // 圣骑士：对亡灵伤害+50%
  if(attacker.role==='paladin' && defender.isUndead){
    atk=Math.floor(atk*1.5);
  }
  
  // 术士：DOT伤害+50%（在executeSkill中处理）
  
  // 基础伤害计算
  let mult=skill?skill.mult:1.0;
  let dmg=Math.max(1,Math.floor((atk*mult-def*0.5)*(0.9+Math.random()*0.2)));
  
  // 暴击计算（考虑职业暴击率）
  let crit=false;
  let critRate=attackerRole&&attackerRole.critRate?attackerRole.critRate:0.1;
  if(skill&&skill.critBonus)critRate+=skill.critBonus;
  
  // 刺客：暗影步 - 暴击伤害+50%
  let critDmg=attackerRole&&attackerRole.critDmg?attackerRole.critDmg:1.8;
  
  if(Math.random()<critRate){dmg=Math.floor(dmg*critDmg);crit=true}
  
  // 闪避计算（考虑职业闪避率）
  let dodgeChance=defenderRole&&defenderRole.dodgeRate?defenderRole.dodgeRate:0.05;
  defender.buffs.forEach(b=>{if(b.stat==='dodge')dodgeChance+=0.3});
  if(skill&&skill.alwaysHit)dodgeChance=0;
  if(Math.random()<dodgeChance)return{dmg:0,dodged:true,crit:false};
  
  // 术士：灵魂虹吸 - 造成伤害的15%转化为生命恢复
  if(attacker.role==='warlock' && !attacker.isEnemy){
    const heal=Math.floor(dmg*0.15);
    attacker.hp=Math.min(attacker.maxHP,attacker.hp+heal);
  }
  
  return{dmg,crit,dodged:false};
}

function getValidTarget(unit,allUnits,targetType){
  const allies=allUnits.filter(u=>u.alive&&u.isEnemy===unit.isEnemy&&u!==unit);
  const enemies=allUnits.filter(u=>u.alive&&u.isEnemy!==unit.isEnemy);
  // 检查嘲讽
  if(targetType.includes('enemy')){
    const taunter=enemies.find(u=>u.buffs.some(b=>b.stat==='taunt'));
    if(taunter&&targetType==='single_enemy')return taunter;
  }
  switch(targetType){
    case 'single_enemy': return pick(enemies);
    case 'all_enemies': return enemies;
    case 'single_ally': return pick(allies.filter(u=>u.hp<u.maxHP))||pick(allies.length>0?allies:[unit]);
    case 'all_allies': return allUnits.filter(u=>u.alive&&u.isEnemy===unit.isEnemy);
    case 'self': return unit;
    default: return pick(enemies);
  }
}

async function executeSkill(user,target,skill,allUnits,logFn){
  const targets=Array.isArray(target)?target:[target];
  switch(skill.type){
    case 'damage':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const r=calcDamage(user,t,skill);
        if(r.dodged){logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，但 ${t.icon}${t.name} 闪避了！`,'info');return}
        let dmg=r.dmg;
        if(t.shield>0){const absorbed=Math.min(t.shield,dmg);t.shield-=absorbed;dmg-=absorbed}
        t.hp=Math.max(0,t.hp-dmg);
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name} 对 ${t.icon}${t.name} 造成 ${dmg} 点伤害${r.crit?' 💥暴击！':''}`,r.crit?'crit':'damage');
        if(skill.stunChance&&Math.random()<skill.stunChance){
          t.buffs.push({stat:'stun',duration:1,name:'眩晕'});
          logFn(`${t.icon}${t.name} 被眩晕了！`,'debuff');
        }
        if(skill.dot){
          t.dot.push({dmg:Math.floor(user.atk*skill.dot.dmgPct),duration:skill.dot.duration,name:'中毒'});
          logFn(`${t.icon}${t.name} 被施加了 ${skill.dot.name}！`,'debuff');
        }
        if(skill.debuff){
          const db=skill.debuff;
          if(db.stat==='all'){
            t.buffs.push({stat:'atk',mult:db.mult,duration:db.duration,name:'诅咒-攻'});
            t.buffs.push({stat:'def',mult:db.mult,duration:db.duration,name:'诅咒-防'});
          }else{
            t.buffs.push({stat:db.stat,mult:db.mult,duration:db.duration,name:'削弱'});
          }
          logFn(`${t.icon}${t.name} 被削弱了！`,'debuff');
        }
        if(t.hp<=0){t.alive=false;logFn(`${t.icon} ${t.name} 倒下了...`,'death')}
      });break;
    }
    case 'heal':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const heal=Math.floor(t.maxHP*skill.healPct);
        t.hp=Math.min(t.maxHP,t.hp+heal);
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，恢复 ${t.icon}${t.name} ${heal} 点生命`,'heal');
      });break;
    }
    case 'buff':{
      targets.forEach(t=>{
        if(!t.alive)return;
        t.buffs.push({...skill.buff,name:skill.name});
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，${t===user?'自身':'队友'}获得增益效果`,'buff');
      });break;
    }
    case 'shield':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const amt=Math.floor(t.maxHP*skill.shieldPct);
        t.shield+=amt;
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，为 ${t.icon}${t.name} 添加 ${amt} 点护盾`,'buff');
      });break;
    }
    case 'drain':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const r=calcDamage(user,t,skill);
        if(r.dodged){logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，但 ${t.icon}${t.name} 闪避了！`,'info');return}
        let dmg=r.dmg;
        if(t.shield>0){const absorbed=Math.min(t.shield,dmg);t.shield-=absorbed;dmg-=absorbed}
        t.hp=Math.max(0,t.hp-dmg);
        const healAmt=Math.floor(dmg*0.5);
        user.hp=Math.min(user.maxHP,user.hp+healAmt);
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，对 ${t.icon}${t.name} 造成 ${dmg} 伤害，恢复 ${healAmt} 生命`,'skill');
        if(t.hp<=0){t.alive=false;logFn(`${t.icon} ${t.name} 倒下了...`,'death')}
      });break;
    }
    case 'debuff':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const db=skill.debuff;
        if(db.stat==='all'){
          t.buffs.push({stat:'atk',mult:db.mult,duration:db.duration,name:'诅咒-攻'});
          t.buffs.push({stat:'def',mult:db.mult,duration:db.duration,name:'诅咒-防'});
        }else{
          t.buffs.push({stat:db.stat,mult:db.mult,duration:db.duration,name:'诅咒'});
        }
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，${t.icon}${t.name} 被诅咒了！`,'debuff');
      });break;
    }
    case 'cleanse':{
      targets.forEach(t=>{
        if(!t.alive)return;
        const negCount=t.buffs.filter(b=>b.stat==='stun'||b.stat==='atk'&&b.mult<1||b.stat==='def'&&b.mult<1).length;
        t.buffs=t.buffs.filter(b=>!(b.stat==='stun'||(b.stat==='atk'&&b.mult<1)||(b.stat==='def'&&b.mult<1)));
        t.dot=[];
        logFn(`${user.icon} ${user.name} 使用 ${skill.icon}${skill.name}，清除了 ${t.icon}${t.name} 的 ${negCount} 个负面效果`,'heal');
      });break;
    }
  }
}

// ==================== 智能战斗AI ====================
function smartChooseSkill(unit,allUnits){
  var role=unit.hero.role;
  var allies=allUnits.filter(function(u){return u.alive&&u.isEnemy===unit.isEnemy&&u!==unit});
  var enemies=allUnits.filter(function(u){return u.alive&&u.isEnemy!==unit.isEnemy});
  var allAlive=allUnits.filter(function(u){return u.alive});

  // 获取可用技能
  var available=[];
  var allSkillIds=[].concat(unit.hero.skills,unit.bonusSkills);
  allSkillIds.forEach(function(sid){
    var sk=SKILLS[sid];if(!sk)return;
    if(unit.mp<sk.mpCost)return;
    if(unit.cooldowns[sid]>0)return;
    available.push({id:sid,skill:sk});
  });
  if(available.length===0)return null;

  // 计算战场态势
  var allyHurtCount=allies.filter(function(a){return a.hp<a.maxHP*0.5}).length;
  var allyCriticalCount=allies.filter(function(a){return a.hp<a.maxHP*0.25}).length;
  var selfHurtPct=unit.hp/unit.maxHP;
  var enemyCount=enemies.length;
  var hasAllyDebuff=allies.some(function(a){return a.buffs.some(function(b){return b.stat==='stun'||(b.stat==='atk'&&b.mult<1)||(b.stat==='def'&&b.mult<1)})||a.dot.length>0});
  var hasEnemyBuff=enemies.some(function(e){return e.buffs.some(function(b){return b.stat==='taunt'})});
  var lowestAlly=null;var lowestPct=1;
  allies.concat([unit]).forEach(function(a){var p=a.hp/a.maxHP;if(p<lowestPct){lowestPct=p;lowestAlly=a}});
  var lowestEnemy=null;var lowestEnemyPct=1;
  enemies.forEach(function(e){var p=e.hp/e.maxHP;if(p<lowestEnemyPct){lowestEnemyPct=p;lowestEnemy=e}});

  // 按角色定位分策略
  if(role==='healer'){
    // 治愈者：优先治疗，其次净化
    if(allyCriticalCount>=2){
      var gh=available.find(function(s){return s.skill.type==='heal'&&s.skill.target==='all_allies'});
      if(gh)return gh;
    }
    if(allyHurtCount>0||selfHurtPct<0.6){
      var heal=available.find(function(s){return s.skill.type==='heal'&&s.skill.target==='single_ally'});
      if(heal)return heal;
      var gh2=available.find(function(s){return s.skill.type==='heal'});
      if(gh2)return gh2;
    }
    if(hasAllyDebuff){
      var cleanse=available.find(function(s){return s.skill.type==='cleanse'});
      if(cleanse)return cleanse;
    }
    return null; // 没治疗需求就普攻
  }

  if(role==='guardian'){
    // 守护者：嘲讽>铁壁>盾击
    if(!unit.buffs.some(function(b){return b.stat==='taunt'})){
      var taunt=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='taunt'});
      if(taunt&&enemyCount>1)return taunt;
    }
    if(allyHurtCount>=2){
      var iw=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='def'});
      if(iw)return iw;
    }
    var dmg=available.find(function(s){return s.skill.type==='damage'});
    if(dmg)return dmg;
    return null;
  }

  if(role==='paladin'){
    // 圣骑士：治疗>护盾>输出
    if(allyCriticalCount>=2){
      var gh=available.find(function(s){return s.skill.type==='heal'&&s.skill.target==='all_allies'});
      if(gh)return gh;
    }
    if(lowestAlly&&lowestPct<0.4){
      var ds=available.find(function(s){return s.skill.type==='shield'});
      if(ds)return ds;
      var heal=available.find(function(s){return s.skill.type==='heal'});
      if(heal)return heal;
    }
    var atk=available.find(function(s){return s.skill.type==='damage'});
    if(atk)return atk;
    return null;
  }

  if(role==='mage'){
    // 法师：AOE>护盾>单体爆发
    if(enemyCount>=2){
      var aoe=available.find(function(s){return s.skill.type==='damage'&&s.skill.target==='all_enemies'});
      if(aoe)return aoe;
    }
    if(allyHurtCount>=2){
      var sh=available.find(function(s){return s.skill.type==='shield'});
      if(sh)return sh;
    }
    // 单体高伤害
    var singles=available.filter(function(s){return s.skill.type==='damage'&&s.skill.target==='single_enemy'});
    singles.sort(function(a,b){return b.skill.mult-a.skill.mult});
    if(singles.length>0)return singles[0];
    return null;
  }

  if(role==='assassin'){
    // 刺客：暗影步(低血量时)>毒刃>背刺
    if(selfHurtPct<0.5){
      var ss=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='dodge'});
      if(ss)return ss;
    }
    // 优先给没DOT的目标上毒
    var poison=available.find(function(s){return s.skill.dot});
    if(poison){
      var noDotEnemy=enemies.find(function(e){return e.dot.length===0});
      if(noDotEnemy)return poison;
    }
    var highDmg=available.find(function(s){return s.skill.type==='damage'&&s.skill.mult>=1.5});
    if(highDmg)return highDmg;
    var anyDmg=available.find(function(s){return s.skill.type==='damage'});
    if(anyDmg)return anyDmg;
    return null;
  }

  if(role==='warlock'){
    // 术士：诅咒>生命汲取>灵魂灼烧
    var curse=available.find(function(s){return s.skill.type==='debuff'});
    if(curse){
      var noCurse=enemies.find(function(e){return !e.buffs.some(function(b){return b.stat==='atk'&&b.mult<1})});
      if(noCurse)return curse;
    }
    if(selfHurtPct<0.7){
      var drain=available.find(function(s){return s.skill.type==='drain'});
      if(drain)return drain;
    }
    var dot=available.find(function(s){return s.skill.dot});
    if(dot){
      var noDot=enemies.find(function(e){return e.dot.length===0});
      if(noDot)return dot;
    }
    var anyDmg=available.find(function(s){return s.skill.type==='damage'});
    if(anyDmg)return anyDmg;
    return null;
  }

  if(role==='ranger'){
    // 游侠：AOE>精准射击>陷阱
    if(enemyCount>=3){
      var aoe=available.find(function(s){return s.skill.type==='damage'&&s.skill.target==='all_enemies'});
      if(aoe)return aoe;
    }
    var aimed=available.find(function(s){return s.skill.type==='damage'&&s.skill.alwaysHit});
    if(aimed)return aimed;
    if(selfHurtPct<0.6&&!unit.buffs.some(function(b){return b.stat==='reflect'})){
      var trap=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='reflect'});
      if(trap)return trap;
    }
    var anyDmg=available.find(function(s){return s.skill.type==='damage'});
    if(anyDmg)return anyDmg;
    return null;
  }

  // 战士(默认)：先开buff>AOE>单体
  if(role==='warrior'){
    var atkBuff=available.find(function(s){return s.skill.type==='buff'&&s.skill.buff&&s.skill.buff.stat==='atk'});
    if(atkBuff&&!unit.buffs.some(function(b){return b.stat==='atk'&&b.mult>1})){
      if(enemyCount>=2||enemies.some(function(e){return e.hp>e.maxHP*0.5}))return atkBuff;
    }
    if(enemyCount>=2){
      var aoe=available.find(function(s){return s.skill.type==='damage'&&s.skill.target==='all_enemies'});
      if(aoe)return aoe;
    }
    var dmg=available.find(function(s){return s.skill.type==='damage'});
    if(dmg)return dmg;
    return null;
  }

  // 兜底：优先伤害技能
  var anySkill=available.find(function(s){return s.skill.type==='damage'});
  if(anySkill)return anySkill;
  return available.length>0?available[0]:null;
}

// ==================== 全局战斗视觉辅助函数 ====================
var _battleScene=null;
var G_autoBattle=false;
var G_battleSpeed=1;
var G_currentStageId=1;
var G_battlePaused=false;
var G_battleRunning=false;

// 战斗统计数据（按角色存储）
var G_battleStats={};
var G_battleUnitIdCounter=0;

function resetBattleStats(){
  G_battleStats={};
  G_battleUnitIdCounter=0;
  updateBattleStatsBoard();
}

function getUnitKey(unit){
  // 使用单位的唯一ID，如果没有则生成一个
  if(!unit.battleId){
    G_battleUnitIdCounter++;
    unit.battleId=(unit.isEnemy?'E':'P')+'_'+G_battleUnitIdCounter;
  }
  return unit.battleId;
}

function recordBattleStat(unit,stat,value){
  var key=getUnitKey(unit);
  if(!G_battleStats[key]){
    G_battleStats[key]={
      name:unit.name,
      icon:unit.icon,
      isEnemy:unit.isEnemy,
      battleId:unit.battleId,
      damage:0,heal:0,damageTaken:0,control:0,dodge:0,crit:0
    };
  }
  G_battleStats[key][stat]=(G_battleStats[key][stat]||0)+value;
  updateBattleStatsBoard();
}

function forceEndBattle(){
  if(!G_battleRunning){
    // 不在战斗中，直接返回关卡选择
    hideBattlePanel();
    switchTab('battle');
    return;
  }
  // 战斗中，需要确认
  var confirmed=confirm('确定要结束战斗吗？\n这将视为战斗失败。');
  if(confirmed){
    G_battleRunning=false;
    G_battlePaused=false;
    G_autoBattle=false;
    showToast('战斗已结束');
    hideBattlePanel();
    switchTab('battle');
  }
  // 点击取消时不做任何操作
}

function updateBattleStatsBoard(){
  // 计算统计数据（不分面板类型）
  var allyStats=[];
  var enemyStats=[];
  
  for(var key in G_battleStats){
    var stat=G_battleStats[key];
    if(stat.isEnemy){
      enemyStats.push(stat);
    }else{
      allyStats.push(stat);
    }
  }
  
  // 按输出排序
  allyStats.sort(function(a,b){return b.damage-a.damage;});
  enemyStats.sort(function(a,b){return b.damage-a.damage;});
  
  function renderStatRow(stat){
    var idNum=stat.battleId?stat.battleId.split('_')[1]:'';
    var displayName=stat.name+(idNum?' <span style="color:#888;font-size:9px">#'+idNum+'</span>':'');
    return '<div style="padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.1)">'
      +'<div style="display:flex;align-items:center;gap:4px;margin-bottom:2px">'
      +'<span style="font-size:14px">'+stat.icon+'</span>'
      +'<span style="flex:1;font-weight:bold;font-size:11px">'+displayName+'</span>'
      +'</div>'
      +'<div style="display:flex;gap:4px;flex-wrap:wrap;font-size:10px">'
      +'<span style="color:#ff6b6b">⚔️'+stat.damage+'</span>'
      +'<span style="color:#2ed573">💚'+stat.heal+'</span>'
      +'<span style="color:#ffa502">🛡️'+stat.damageTaken+'</span>'
      +'<span style="color:#a55eea">🎯'+stat.control+'</span>'
      +'<span style="color:#70a1ff">💨'+stat.dodge+'</span>'
      +'<span style="color:#ff4757">💥'+stat.crit+'</span>'
      +'</div>'
      +'</div>';
  }
  
  function renderToPanel(allyEl,enemyEl){
    if(!allyEl||!enemyEl)return;
    allyEl.innerHTML=allyStats.length>0?allyStats.map(renderStatRow).join(''):'<div class="text-dim">暂无数据</div>';
    enemyEl.innerHTML=enemyStats.length>0?enemyStats.map(renderStatRow).join(''):'<div class="text-dim">暂无数据</div>';
  }
  
  // 更新普通战斗面板
  renderToPanel(
    document.getElementById('ally-stats'),
    document.getElementById('enemy-stats')
  );
  
  // 更新竞技场战斗面板
  renderToPanel(
    document.getElementById('arena-ally-stats'),
    document.getElementById('arena-enemy-stats')
  );
}

function toggleBattlePause(){
  G_battlePaused=!G_battlePaused;
  showToast(G_battlePaused?'⏸️ 战斗已暂停':'▶️ 战斗继续');
  updatePauseButton();
}

function updatePauseButton(){
  var btn=document.getElementById('battle-pause-btn');
  if(btn){
    btn.textContent=G_battlePaused?'▶️ 继续':'⏸️ 暂停';
    btn.className='btn btn-sm '+(G_battlePaused?'btn-primary':'');
  }
}
function getUnitEl(unit){var uid=unit.name+'-'+unit.icon;return document.querySelector('[data-battle-uid="'+uid+'"]')}
function showFloat(unit,text,cls){var el=getUnitEl(unit);if(!el)return;var num=document.createElement('div');num.className='float-num '+(cls||'');num.textContent=text;el.appendChild(num);setTimeout(function(){if(num.parentNode)num.parentNode.removeChild(num)},1100)}
function showSkillEffect(skillIcon,skillName,elementClass){if(!_battleScene)return;var overlay=document.createElement('div');overlay.className='skill-effect-overlay '+(elementClass||'');overlay.innerHTML='<div class="skill-effect-text">'+skillIcon+' '+skillName+'</div>';_battleScene.appendChild(overlay);setTimeout(function(){if(overlay.parentNode)overlay.parentNode.removeChild(overlay)},900)}
function animUnit(unit,cls,duration){var el=getUnitEl(unit);if(!el)return;el.classList.add(cls);setTimeout(function(){el.classList.remove(cls)},duration||400)}
function highlightUnit(unit){document.querySelectorAll('.battle-unit.acting').forEach(function(el){el.classList.remove('acting')});var el=getUnitEl(unit);if(el)el.classList.add('acting')}
function clearHighlight(){document.querySelectorAll('.battle-unit.acting').forEach(function(el){el.classList.remove('acting')})}
function stopAutoBattle(){
  G_autoBattle=false;
  G_battleRunning=false;
  G_battlePaused=false;
}

function setBattleSpeed(spd){
  G_battleSpeed=spd;
  showToast('战斗倍速: x'+spd);
  // 更新固定战斗面板中的倍速按钮样式
  var speeds=[1,2,4,8];
  speeds.forEach(function(s){
    var btn=document.getElementById('speed-'+s);
    if(btn){
      if(s===spd){
        btn.classList.add('btn-primary');
      }else{
        btn.classList.remove('btn-primary');
      }
    }
  });
}

async function runBattle(stageId){
  // 如果战斗已在运行，不重复启动
  if(G_battleRunning){return;}
  G_battleRunning=true;
  G_battlePaused=false;
  updatePauseButton();
  
  const stage=getStage(stageId);
  if(!stage){G_battleRunning=false;return;}
  const teamHeroes=G.team.filter(h=>h!==null);
  if(teamHeroes.length===0){showToast('请先编队！');G_battleRunning=false;return;}

  let playerUnits=teamHeroes.map(h=>createBattleUnit(h,false));
  let enemyUnits=stage.enemies.map(e=>{
    const tpl=HERO_TEMPLATES.find(t=>t.name===e.name)||HERO_TEMPLATES.find(t=>t.role===e.role&&t.quality===e.quality);
    const fakeHero=tpl?{...createHero(tpl.id,e.level),name:e.name,icon:e.icon,skills:e.skills,bonusSkills:[]}
      :{name:e.name,icon:e.icon,role:e.role,quality:e.quality,level:e.level,skills:e.skills,bonusSkills:[],
        maxHP:calcStat(ROLES[e.role]?ROLES[e.role].baseHP:100,QUALITY_MULT[e.quality]||1,e.level),
        atk:calcStat(ROLES[e.role]?ROLES[e.role].baseATK:15,QUALITY_MULT[e.quality]||1,e.level),
        def:calcStat(ROLES[e.role]?ROLES[e.role].baseDEF:10,QUALITY_MULT[e.quality]||1,e.level),
        spd:calcStat(ROLES[e.role]?ROLES[e.role].baseSPD:10,QUALITY_MULT[e.quality]||1,e.level),
        maxMP:calcStat(ROLES[e.role]?ROLES[e.role].baseMP:40,QUALITY_MULT[e.quality]||1,e.level),
        hp:0,mp:0,equipment:{weapon:null,armor:null,accessory:null}};
    fakeHero.hp=fakeHero.maxHP;fakeHero.mp=fakeHero.maxMP;
    return createBattleUnit(fakeHero,true);
  });
  let allUnits=[...playerUnits,...enemyUnits];
  
  // 初始化战斗统计数据
  resetBattleStats();

  // 显示战斗面板，切换到战斗页
  currentTab='battle';
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.tab==='battle');
  });
  var battlePanel=document.getElementById('battle-panel');
  if(!battlePanel){showToast('战斗面板加载失败');G_battleRunning=false;return;}
  battlePanel.style.display='';
  document.getElementById('content').style.display='none';
  const logEl=document.getElementById('battle-log');
  const playerTeamEl=document.getElementById('player-team');
  const enemyTeamEl=document.getElementById('enemy-team');
  const battleInfoEl=document.getElementById('battle-info');
  const battleScene=document.getElementById('battle-scene');
  if(!logEl||!playerTeamEl||!enemyTeamEl||!battleInfoEl||!battleScene){showToast('战斗元素加载失败');G_battleRunning=false;return;}
  _battleScene=battleScene;
  var pbbRound=0;
  const roundBadge=document.getElementById('battle-round-badge');
  logEl.innerHTML='';
  battleInfoEl.innerHTML=`<div class="log-title">⚔️ 第${stage.id}章：${stage.name}</div><div class="text-dim text-sm">${stage.desc}</div>`;

  function log(msg,cls){
    cls=cls||'info';
    var line=document.createElement('div');
    line.className='log-line log-'+cls;
    line.textContent=msg;
    logEl.appendChild(line);
    logEl.scrollTop=logEl.scrollHeight;
  }

  function renderTeams(){
    playerTeamEl.innerHTML=playerUnits.map(u=>{
      const hpPct=Math.max(0,(u.hp/u.maxHP)*100);
      const mpPct=Math.max(0,(u.mp/u.maxMP)*100);
      const shieldPct=u.maxHP>0?Math.min(100,(u.shield/u.maxHP)*100):0;
      const isLow=hpPct<30;
      const roleIcon=ROLES[u.hero.role]?ROLES[u.hero.role].icon:'⚔️';

        const isPos=b.mult>1||b.stat==='taunt'||b.stat==='dodge'||b.stat==='reflect'||b.stat==='stun';
        return '<span class="buff-tag '+(isPos?'buff-positive':'buff-negative')+'">'+(b.name||b.stat)+(b.duration>0?'('+b.duration+')':'')+'</span>';
      }).join('');
      const dotsHTML=u.dot.map(d=>'<span class="buff-tag buff-dot">'+d.name+'('+d.duration+')</span>').join('');

        +'</div>'

    enemyTeamEl.innerHTML=enemyUnits.map(u=>{
